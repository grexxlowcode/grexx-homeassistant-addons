name: "Energyboxx Integration"
description: "Integration for Energyboxx with MQTT community topic subscription"
version: "1.1.0"
slug: "energyboxx"
init: false
arch:
  - aarch64
  - amd64
  - armhf
  - armv7
  - i386
boot: auto
options:
  energyboxx_mqtt_username: ""
  energyboxx_mqtt_password: ""
  community_topic: "community/#"
schema:
  energyboxx_mqtt_username: str
  energyboxx_mqtt_password: password
  community_topic: str
logs: true
homeassistant_api: true
hassio_api: true
hassio_role: default
startup: system
